name: Bug Report
description: Report something that's broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before you start:** Read [CONTRIBUTING.md](https://github.com/dpopsuev/alf-agent/blob/main/CONTRIBUTING.md).

        **Alf Agent** is a **BDFL fork**: outside bug reports are typically **auto-closed** without triage. There is no expectation of review for strangers.

        Bugs in **upstream Pi** belong in **[earendil-works/pi-mono](https://github.com/earendil-works/pi-mono)**.

        Keep this short. If it doesn't fit on one screen, it's too long. Write in your own voice.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Be specific. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: e.g. 0.49.0
    validations:
      required: false
