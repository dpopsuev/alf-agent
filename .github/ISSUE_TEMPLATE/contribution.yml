name: External inquiry (not triaged)
description: Outside proposals are not reviewed — fork locally or contribute to upstream Pi
labels: []
body:
  - type: markdown
    attributes:
      value: |
        **Alf Agent** is a **BDFL fork**. Unsolicited contributions are **not** accepted; issues from strangers are typically **auto-closed** without reply.

        Read [CONTRIBUTING.md](https://github.com/dpopsuev/alf-agent/blob/main/CONTRIBUTING.md).

        You may **read** and **fork** this MIT-licensed code. To contribute to **Pi**, use **[earendil-works/pi-mono](https://github.com/earendil-works/pi-mono)**.

  - type: textarea
    id: note
    attributes:
      label: Note (optional)
      description: Do not expect maintainers to read or respond.
    validations:
      required: false
